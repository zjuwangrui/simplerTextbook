services:
  backend:
    build:
      context: ./src/backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: simplertextbook-backend
    ports:
      - "5000:5000"
    volumes:
      - ./src/backend/config/app.yaml:/app/config/app.yaml:ro
      - ./runtime/backend:/app/runtime

  frontend:
    build:
      context: ./src/frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: simplertextbook-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
